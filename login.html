<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Stackly Estates</title>
  <meta name="description" content="Access your user or admin dashboard portfolio with Stackly Estates.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>

  <!-- Authentication Wrapper -->
  <div class="auth-wrapper" style="background-image: url('images/properties/villa-1.webp');">
    <div class="auth-bg-overlay"></div>
    <div class="auth-blob auth-blob-1"></div>
    <div class="auth-blob auth-blob-2"></div>

    <!-- Center Card -->
    <div class="glass-card auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo">
          <svg viewBox="0 0 24 24"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3zm5 15h-2v-4H9v4H7v-6.17l5-4.5 5 4.5V18z"/></svg>
          <span>STACKLY <span class="gold">ESTATES</span></span>
        </a>
        <h2>Welcome Back</h2>
        <p>New to Stackly? <a href="create-account.html">Get Started</a></p>
      </div>

      <form class="auth-form" id="login-form" novalidate>
        <!-- Role selector -->
        <div class="form-group">
          <label class="form-label" for="login-role">Portal Role</label>
          <select class="form-control auth-role-select" id="login-role">
            <option value="user">User Portal</option>
            <option value="admin">Admin Console</option>
          </select>
        </div>

        <!-- Email Address -->
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" class="form-control" id="login-email" placeholder="you@example.com" autocomplete="email" required>
          <div class="invalid-feedback">Enter a valid email address.</div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-control" id="login-password" placeholder="Enter password" autocomplete="current-password" required>
            <button type="button" class="password-toggle-btn" aria-label="Toggle Password Visibility">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
          </div>
          <div class="invalid-feedback">Password must be at least 8 characters.</div>
        </div>

        <div class="auth-meta-row">
          <label class="auth-remember">
            <input type="checkbox" id="login-remember">
            <span>Remember Me</span>
          </label>
          <a href="404.html" class="forgot-link">Forgot Password?</a>
        </div>
        <div id="remember-warning" style="display: none; color: #EF4444; font-size: 0.85rem; font-weight: 600; margin-top: 0.5rem; text-align: left;">
          ⚠️ Please check "Remember Me" to proceed.
        </div>

        <button type="submit" class="btn btn-primary btn-shimmer" style="width: 100%; margin-top: var(--spacing-sm);">Login</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pages/auth.js"></script>
</body>
</html>
